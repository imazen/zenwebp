[package]
name = "zenwebp"
version = "0.4.4"
edition = "2024"
license = "AGPL-3.0-only OR LicenseRef-Imazen-Commercial"
rust-version = "1.93"

description = "High-performance WebP encoding and decoding in pure Rust"
homepage = "https://github.com/imazen/zenwebp"
repository = "https://github.com/imazen/zenwebp"
documentation = "https://docs.rs/zenwebp"
categories = ["multimedia::images", "multimedia::encoding", "encoding"]
keywords = ["webp", "image", "encoder", "decoder", "codec"]
readme = "README.md"
autobenches = false

include = ["/src", "LICENSE-AGPL", "README.md", "CHANGES.md"]

[dependencies]
# Core dependencies - all no_std compatible
byteorder-lite = { version = "0.1.0", default-features = false }
enough = { version = "0.4.3", default-features = false, features = ["alloc"] }
hashbrown = { version = "0.16", default-features = false, features = ["default-hasher"] }
thiserror = { version = "2.0.18", default-features = false }
whereat = { version = "0.1.5", default-features = false }
libm = "0.2.16"
zencodec = { version = "0.1.13", optional = true }
# zennode = { path = "../zennode/zennode", optional = true, default-features = false, features = ["derive"] }
zenpixels = { version = "0.2.10", default-features = false }
self_cell = { version = "1.2", optional = true }
bytemuck = { version = "1", default-features = false, features = ["extern_crate_alloc"] }
garb = { version = "0.2.5", default-features = false, features = ["experimental"] }
linear-srgb = { version = "0.6.7"}
zenyuv = { version = "0.1.3", default-features = false }
png = { version = "0.18", optional = true }
webp = { version = "0.3.0", optional = true }
archmage = { version = "0.9.15", features = ["macros"] }
magetypes = { version = "0.9.15" }
rgb = { version = "0.8", optional = true, default-features = false, features = ["as-bytes"] }
imgref = { version = "1.12", optional = true, default-features = false }

[dev-dependencies]
archmage = { version = "0.9.15", features = ["std", "macros"] }
paste = "1.0.14"
png = "0.18"
rand = "0.10.1"
rgb = "0.8"

# Native-only dev-deps (C bindings, threading, or native-only features)
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
butteraugli = "0.9.0"
codec-corpus = "1"
dssim-core = "3.4"
fast-ssim2 = "0.7.1"
imgref = "1.12"
libwebp-sys = "0.14"
webp = "0.3.1"
webpx = "0.1.4"
yuv = "0.8"
# serde_json = "1"
zenbench = { version = "0.1.2", features = ["criterion-compat"] }
zensim = "0.2"
zensim-regress = "0.3.0"

[features]
default = ["std", "fast-yuv", "pixel-types"]
# Enable std library. Required only for Encoder.encode_to_writer().
# Without std, use slice-based decoder and Vec-based encoder APIs.
std = ["thiserror/std", "whereat/std", "byteorder-lite/std"]
# Type-safe pixel format support via the `rgb` crate.
pixel-types = ["dep:rgb"]
# imgref integration for Img<Vec<P>> / Img<&[P]> decode/encode.
imgref = ["dep:imgref", "pixel-types"]
# Enable AVX-512 autoversion variants (passthrough to archmage).
avx512 = ["archmage/avx512"]
# Test-only: cause the SIMD tier parity tests to PANIC if any token is
# compile-time guaranteed (and therefore cannot be disabled at runtime).
# Used in CI to ensure full tier coverage. Do NOT combine with
# `-Ctarget-cpu=native` — that bakes features in at compile time and
# defeats runtime disabling, which is exactly what this feature catches.
testable_dispatch = []
# --- Internal features (not for public use, underscore prefix = private) ---
# Nightly-only: enables #[bench] micro-benchmarks. Requires `cargo +nightly test`.
_benchmarks = []
# Run corpus-based integration tests (requires codec-corpus data).
_corpus_tests = []
# Debug mode selection for encoder (set MB_DEBUG=x,y env var to debug specific macroblock).
mode_debug = ["std"]
# Enable PNG/WebP deps for profiling binaries.
_profiling = ["dep:png", "dep:webp"]
# WASM profiling - minimal deps for wasm32 benchmarking.
_wasm_profiling = ["std"]
# Deprecated no-op: YUV conversion now always uses zenyuv.
# Kept for backwards compatibility so existing Cargo.toml entries
# with `features = ["fast-yuv"]` don't break.
fast-yuv = []
# Enable zencodec trait integration
zencodec = ["dep:zencodec", "dep:self_cell"]
# Enable zennode pipeline node definitions
# zennode = ["dep:zennode"]

[[example]]
name = "empirical_sweep"
path = "dev/empirical_sweep.rs"

[[example]]
name = "hrtb_test"
required-features = ["zencodec"]

[[example]]
name = "lossless_anim_path_test"
required-features = ["zencodec", "std"]

[[example]]
name = "heap_strip_pipeline"
required-features = ["zencodec", "std"]

[[bin]]
name = "zenwebp-encode"
path = "src/bin/zenwebp_encode.rs"
required-features = ["_profiling"]

[[bin]]
name = "profile_encode"
path = "benches/profile_encode.rs"
required-features = ["_profiling"]

[[bin]]
name = "profile_libwebp"
path = "benches/profile_libwebp.rs"
required-features = ["_profiling"]

[[bin]]
name = "profile_decode"
path = "benches/profile_decode.rs"
required-features = ["_profiling"]

[[bin]]
name = "profile_wasm"
path = "benches/profile_wasm.rs"
required-features = ["_wasm_profiling"]

[lints.rust]
# archmage::autoversion(cfg(simd)) uses "simd" as an archmage config name, not a Cargo feature
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(simd)'] }

[profile.release]
lto = true
codegen-units = 1

# Criterion benchmarks
[[bench]]
name = "encode_benchmark"
harness = false

[[bench]]
name = "encode_vs_libwebp"
harness = false

[[bench]]
name = "decode_benchmark"
harness = false

[[bench]]
name = "decode_zenbench"
harness = false

[[bench]]
name = "decode_compare"
harness = false

[dev-dependencies.image-webp]
version = "0.2"


[[bench]]
name = "decode_lossless_compare"
harness = false

[[bench]]
name = "predictor_coalesce"
harness = false
required-features = ["_benchmarks"]

# Codec code is unusably slow in debug mode (10-50x). Always optimize,
# even for `cargo test`. This matches libwebp which is always -O2.
[profile.dev]
opt-level = 2

[profile.test]
opt-level = 2
